name: Student Dashboard CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.10"
  JFROG_REPO: new-student-dashboard

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage pylint

  analyze:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov coverage
      - run: pylint app || true
      - run: pytest --cov=app --cov-report=xml

  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r build.zip app run.py requirements.txt

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage
      - run: pytest --cov=app --cov-fail-under=90

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Versioning
        run: |
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          PATCH=$((PATCH+1))
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

      - run: zip -r app-${NEW_VERSION}.zip app run.py requirements.txt

      - name: Upload to JFrog
        run: |
          curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }} \
          -T app-${NEW_VERSION}.zip \
          "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/app-${NEW_VERSION}.zip"
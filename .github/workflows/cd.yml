name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["Student Dashboard CI/CD Pipeline"]
    types:
      - completed

env:
  JFROG_REPO: new-student-dashboard

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            APP_DIR=/home/ubuntu/app
            BACKUP_DIR=/home/ubuntu/backup
            mkdir -p $APP_DIR $BACKUP_DIR
            cd $APP_DIR

            echo "Fetching latest artifact..."

            LATEST_FILE=$(curl -s -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
              "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/" \
              | grep -o 'app-[0-9.]*.zip' | sort -V | tail -n 1)

            if [ -z "$LATEST_FILE" ]; then
              echo "No artifact found!"
              exit 1
            fi

            echo "Latest version: $LATEST_FILE"

            # Backup current
            if [ -f current.zip ]; then
              cp current.zip $BACKUP_DIR/backup_$(date +%s).zip
              echo "Backup created"
            fi

            # Download new version
            curl -f -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
              -O "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/$LATEST_FILE"

            mv $LATEST_FILE current.zip

            # Stop old app
            PID=$(lsof -t -i:5000 || true)
            if [ ! -z "$PID" ]; then
              kill -9 $PID || true
            fi

            # Deploy
            rm -rf app venv
            unzip -o current.zip

            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install gunicorn

            nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

            sleep 15

            echo "Running system validation..."

            STATUS_CODE=$(curl -s -o response.txt -w "%{http_code}" http://localhost:5000/system-check || true)
            BODY=$(cat response.txt || true)

            echo "HTTP: $STATUS_CODE"
            echo "Body: $BODY"

            if [ "$STATUS_CODE" = "200" ] && [[ "$BODY" == *"ok"* ]]; then
              echo "Deployment Successful"
              exit 0
            fi

            echo "Deployment Failed → Rolling Back"

            LAST_BACKUP=$(ls -t $BACKUP_DIR | head -n 1)

            if [ -z "$LAST_BACKUP" ]; then
              echo "No backup available"
              exit 1
            fi

            cp $BACKUP_DIR/$LAST_BACKUP current.zip
            rm -rf app venv
            unzip -o current.zip

            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt

            nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

            echo "Rollback Completed"
            exit 1
            